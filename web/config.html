<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>配置</title>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/style.css') }}">
</head>
<body>
    <div class="config-container">
        <div class="config-section">
            <div class="config-row">
                <div class="config-label">摄像机号</div>
                <input type="text" class="config-input" id="camera-id" value="">
            </div>
            <div class="config-row">
                <div class="config-label">串口号</div>
                <input type="text" class="config-input" id="serial-port" value="">
            </div>
            <div class="config-row">
                <div class="config-label">开关延迟</div>
                <input type="text" class="config-input" id="delay-large" value="">
            </div>
            <div class="config-row">
                <div class="config-label">大差阈值</div>
                <input type="text" class="config-input" id="largediff-threshold" value="">
            </div>
            <div class="config-row">
                <div class="config-label">小差阈值</div>
                <input type="text" class="config-input" id="smalldiff-threshold" value="">
            </div>
            <div class="config-row">
                <div class="config-label">底部阈值</div>
                <input type="text" class="config-input" id="bottom-threshold" value="">
            </div>
            <div class="config-row">
                <div class="config-label">需要重载</div>
            </div>
        </div>
        
        <div class="button-container">
            <button class="config-button" id="ok-button">应用</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadCurrentConfig();
            
            document.getElementById('ok-button').addEventListener('click', function() {
                const cameraId = parseInt(document.getElementById('camera-id').value);
                const serialPort = document.getElementById('serial-port').value;
                const delayLarge = parseFloat(document.getElementById('delay-large').value);
                const largediffThreshold = parseFloat(document.getElementById('largediff-threshold').value);
                const smalldiffThreshold = parseFloat(document.getElementById('smalldiff-threshold').value);
                const bottomThreshold = parseFloat(document.getElementById('bottom-threshold').value);
                
                if (isNaN(cameraId)) {
                    alert('摄像机编号必须是数字');
                    return;
                }
                
                fetch('/api/save_config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        'cap_num': cameraId,
                        'port': serialPort,
                        'delay_large': delayLarge,
                        'large_diff_threshold': largediffThreshold,
                        'small_diff_threshold': smalldiffThreshold,
                        'bottom_threshold': bottomThreshold
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.close();
                    } else {
                        alert('保存失败: ' + (data.error || '未知错误'));
                    }
                })
                .catch(error => {
                    alert('保存失败: ' + error);
                });
            });
        });
        
        function loadCurrentConfig() {
            console.log('正在加载当前配置...');
            
            // Get the current config from the server
            fetch('/api/get_config')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(config => {
                    console.log('获取到的配置:', config);
                    
                    if (config.error) {
                        console.error('获取配置错误:', config.error);
                        return;
                    }
                    
                    if (config.cap_num !== undefined) {
                        document.getElementById('camera-id').value = config.cap_num;
                    }
                    if (config.port) {
                        document.getElementById('serial-port').value = config.port;
                    }
                    if (config.delay_large) {
                        document.getElementById('delay-large').value = config.delay_large;
                    }
                    if (config.large_diff_threshold) {
                        document.getElementById('largediff-threshold').value = config.large_diff_threshold;
                    }
                    if (config.small_diff_threshold) {
                        document.getElementById('smalldiff-threshold').value = config.small_diff_threshold;
                    }
                    if (config.bottom_threshold) {
                        document.getElementById('bottom-threshold').value = config.bottom_threshold;
                    }
                })
                .catch(error => {
                    console.error('获取配置失败:', error);
                    alert('无法加载当前配置: ' + error.message);
                });
        }
    </script>
</body>
</html>
